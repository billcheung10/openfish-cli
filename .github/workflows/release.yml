name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p openfish-cli

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          archive="openfish-${version}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'target/${{ matrix.target }}/release/openfish.exe' -DestinationPath '$archive' -Force"
          else
            tar -czf "$archive" -C "target/${{ matrix.target }}/release" openfish
          fi
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "${archive}.sha256"
          elif command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            export ARCHIVE="$archive"
            powershell -NoProfile -Command '$archive = $env:ARCHIVE; $hash = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLower(); Set-Content -Path "$archive.sha256" -Value "$hash  $archive" -NoNewline'
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openfish-${{ matrix.target }}
          path: |
            openfish-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            openfish-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
